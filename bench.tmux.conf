# bench.tmux.conf — source this from your ~/.tmux.conf:
#   echo 'source-file /path/to/benchwork/bench.tmux.conf' >> ~/.tmux.conf
#
# Options are global on purpose (spec §2 design): the bench status segments key off
# the per-session @bench_repo option, so they render empty in non-bench sessions
# where @bench_repo is unset. `bench up` sets @bench_repo on the project session.
# BENCH_ASCII=1 in the sourcing shell swaps the nerd-font glyphs for plain ASCII.

set -g mouse on

# ── Hotkeys — the COMPLETE surface (spec A.9/A.10). No prefix; do not add more. ──
# deck/crew jumps are guarded by a pure-format window-name match so a non-bench
# session gets a silent no-op instead of a "can't find window" flash. No run-shell:
# a shelled-out `tmux` would resolve the DEFAULT socket, not necessarily this server.
bind -n M-1 if -F '#{m:* deck *,#{W: #{window_name} }}' { select-window -t deck }
bind -n M-2 if -F '#{m:* crew *,#{W: #{window_name} }}' { select-window -t crew }
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D
bind -n M-z resize-pane -Z
bind -n M-r refresh-client -S
# Alt+Space → the bench prompt: type any verb (e.g. `watch 43`), Enter, it vanishes.
# In a session without @bench_repo, say so instead of surfacing a raw `cd: ""` error.
# NB: Windows reserves Alt+Space for the window system menu — Windows Terminal users must
# unbind it there first (settings.json actions: { "command": "unbound", "keys": "alt+space" }).
bind -n M-Space command-prompt -p "bench>" { run-shell 'if cd "#{@bench_repo}" 2>/dev/null; then bench %1; else echo "bench: this session has no @bench_repo — run bench up in the project first"; fi' }
# Alt+g → the task panel (Appendix-B tier-1 palette, user-requested during the first wave):
# fzf over all tasks; Enter jumps into the worker's session, ctrl-w watches, ctrl-o peeks.
bind -n M-g display-popup -E -w 72% -h 60% 'cd "#{@bench_repo}" 2>/dev/null && bench panel || true'

# ── Status bar ──
set -g status-interval 5
set -g status-right-length 150
# --refresh-titles is a free side effect here: the 5s heartbeat keeps pane-border
# titles fresh while it renders the chips. cwd is empty when tmux runs #(): @bench_repo fixes it.
set -g status-right '#(cd "#{@bench_repo}" 2>/dev/null && bench status --tmux --refresh-titles)'
# status-left: ⚒ <session>, or plain `bench <session>` when BENCH_ASCII is set at source time.
if-shell -b '[ -n "$BENCH_ASCII" ]' \
  'set -g status-left "bench #S "' \
  'set -g status-left "⚒ #S "'

# ── Chip clicks (tmux ≥3.4): status --tmux wraps each chip in a task_<id> range. ──
# Left-click a task chip → jump INTO that worker's claude session (answer prompts in
# person; worker sessions are named bench-<workbench session>-<id>). Get back: Ctrl-b s.
# Right-click a chip → that task's context menu (bench menu — same one the tiles use).
# NB: switch-client -t does NOT expand #{} formats — must go through run-shell, where
# they do; -S + -c pin the right server socket and the clicking client explicitly.
bind -Troot MouseDown1StatusRight if -F '#{m:task_*,#{mouse_status_range}}' { run-shell 'tmux -S "#{socket_path}" switch-client -c "#{client_name}" -t "=bench-#{session_name}-#{s/task_//:mouse_status_range}" 2>/dev/null || true' }
bind -Troot MouseDown3StatusRight if -F '#{m:task_*,#{mouse_status_range}}' { run-shell 'cd "#{@bench_repo}" && bench menu "#{s/task_//:mouse_status_range}" --client "#{client_name}" --mouse' }

# ── Mouse navigation menus (nav wave §1.2) — one `bench menu` per task, many gestures. ──
# Needs tmux ≥3.7 for control|N click ranges (3.7b is the floor). Control-range budget:
# 9 = per-tile [≡] menu; 8 = reserved for a future chip menu; ranges 0–7 stay free.
# Every gesture has a keyboard fallback (prefix+m below) — mouse support varies by terminal.
# Windows Terminal: Shift+click does native text selection and BYPASSES tmux mouse mode, so
# hold Shift to select text, click without Shift to hit these bindings.
#
# Right-click a crew worker tile → its context menu (jump/watch/peek/nudge/review/pop-or-embed).
# Guard: only panes tagged @bench_view (a bench tile); every other pane keeps tmux's own
# default context menu (preserved verbatim in the else branch). The menu is BUILT by
# `bench menu` because a tmux -t target never expands #{} — bench positions/pins it itself.
bind -n MouseDown3Pane if -F '#{@bench_view}' \
  { run-shell 'cd "#{@bench_repo}" && bench menu --from-pane "#{pane_id}" --client "#{client_name}" --mouse' } \
  { if-shell -F -t = "#{||:#{mouse_any_flag},#{&&:#{pane_in_mode},#{?#{m/r:(copy|view)-mode,#{pane_mode}},0,1}}}" { select-pane -t = ; send-keys -M } { display-menu -T "#[align=centre]#{pane_index} (#{pane_id})" -t = -x M -y M "#{?#{m/r:(copy|view)-mode,#{pane_mode}},Go To Top,}" < { send-keys -X history-top } "#{?#{m/r:(copy|view)-mode,#{pane_mode}},Go To Bottom,}" > { send-keys -X history-bottom } '' "#{?#{&&:#{buffer_size},#{!:#{pane_in_mode}}},Paste #[underscore]#{=/9/...:buffer_sample},}" p { paste-buffer } '' "#{?mouse_word,Search For #[underscore]#{=/9/...:mouse_word},}" C-r { if-shell -F "#{?#{m/r:(copy|view)-mode,#{pane_mode}},0,1}" "copy-mode -t=" ; send-keys -X -t = search-backward -- "#{q:mouse_word}" } "#{?mouse_word,Type #[underscore]#{=/9/...:mouse_word},}" C-y { copy-mode -q ; send-keys -l "#{q:mouse_word}" } "#{?mouse_word,Copy #[underscore]#{=/9/...:mouse_word},}" c { copy-mode -q ; set-buffer "#{q:mouse_word}" } "#{?mouse_line,Copy Line,}" l { copy-mode -q ; set-buffer "#{q:mouse_line}" } '' "#{?mouse_hyperlink,Type #[underscore]#{=/9/...:mouse_hyperlink},}" C-h { copy-mode -q ; send-keys -l "#{q:mouse_hyperlink}" } "#{?mouse_hyperlink,Copy #[underscore]#{=/9/...:mouse_hyperlink},}" h { copy-mode -q ; set-buffer "#{q:mouse_hyperlink}" } '' "#{?#{!:#{pane_floating_flag}},Horizontal Split,}" h { split-window -h } "#{?#{!:#{pane_floating_flag}},Vertical Split,}" v { split-window -v } '' "#{?#{&&:#{!:#{pane_floating_flag}},#{>:#{window_panes},1}},Swap Up,}" u { swap-pane -U } "#{?#{&&:#{!:#{pane_floating_flag}},#{>:#{window_panes},1}},Swap Down,}" d { swap-pane -D } "#{?pane_marked_set,,-}Swap Marked" s { swap-pane } '' Kill X { kill-pane } Respawn R { respawn-pane -k } "#{?pane_marked,Unmark,Mark}" m { select-pane -m } "#{?#{>:#{window_panes},1},,-}#{?window_zoomed_flag,Unzoom,Zoom}" z { resize-pane -Z } } }
#
# Double-click a tile → zoom it (double-click again restores). Same @bench_view guard;
# other panes keep tmux's default double-click word-select.
bind -n DoubleClick1Pane if -F '#{@bench_view}' \
  { resize-pane -Z } \
  { select-pane -t = ; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H ; send-keys -X select-word ; run-shell -d 0.3 ; send-keys -X copy-pipe-and-cancel } }
#
# The per-tile [≡] glyph (pane-border-format, below) sits in a control|9 range, so clicking
# it fires MouseDown1Control9 → the same tile menu. Non-tile control|9 clicks keep tmux's
# default ("kill pane?" confirm).
bind -n MouseDown1Control9 if -F '#{@bench_view}' \
  { run-shell 'cd "#{@bench_repo}" && bench menu --from-pane "#{pane_id}" --client "#{client_name}" --mouse' } \
  { display-menu -O -T "Kill pane #{pane_index}?" -t = -x M -y M Yes y { kill-pane -t = } No n {  } }
#
# Keyboard fallback: prefix + m opens the menu for the FOCUSED crew tile, centered (no mouse
# needed). Alt+g stays the full task palette. Focus a tile first (Alt+2, then arrow keys).
bind m if -F '#{@bench_view}' \
  { run-shell 'cd "#{@bench_repo}" && bench menu --from-pane "#{pane_id}" --client "#{client_name}"' } \
  { display-message 'bench: focus a crew worker tile first (Alt+2 then arrows), then prefix+m for its menu' }

# ── Status bar ground: tmux's default green bar clashes with every chip color (found
# live: orange needs-input chips were unreadable on it). Dark neutral ground instead. ──
set -g status-style 'bg=colour234,fg=colour247'
set -g window-status-current-style 'fg=colour114,bold'
set -g window-status-bell-style 'fg=colour208,bold,reverse'

# ── Bells visible: blocked/review workers ring the crew window (spec §2, acceptance 3). ──
setw -g monitor-bell on
set -g bell-action any
set -g visual-bell off

# ── Pane borders: glanceable worker titles (`T-042 · working`). ──
setw -g pane-border-status top
setw -g pane-border-lines single
# Show the pane title, but fall back to the running command while the title is still
# the default hostname (a freshly-split pane bench hasn't titled yet). Bench tiles (panes
# tagged @bench_view) grow a clickable [≡] menu glyph in a control|9 range on the right.
setw -g pane-border-format ' #{?#{==:#{pane_title},#{host}},#{pane_current_command},#{pane_title}} #{?@bench_view,#[range=control|9] [≡] #[norange],}'
set -g pane-border-style 'fg=colour240'
set -g pane-active-border-style 'fg=colour45'

# Marker so `bench doctor` can tell this conf is sourced.
set -g @bench_conf 1
